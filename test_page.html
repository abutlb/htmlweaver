<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>htmlweaver — صفحة الاختبار</title>
  <style>
    /* ── Reset ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: #94a3b8;
      font-size: 1.1rem;
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 900px;
      margin-bottom: 3rem;
    }

    .card {
      background: #1e1e2e;
      border: 1px solid #2d2d3f;
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #667eea;
    }

    .card .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: #f1f5f9;
    }

    .card p {
      font-size: 0.9rem;
      color: #64748b;
    }

    /* ── Counter ── */
    .counter-section {
      text-align: center;
      margin-bottom: 3rem;
    }

    .counter-display {
      font-size: 5rem;
      font-weight: bold;
      color: #667eea;
      margin: 1rem 0;
      transition: transform 0.1s ease;
    }

    .counter-display.bump {
      transform: scale(1.2);
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .btn:hover { opacity: 0.85; }

    .btn-add    { background: #667eea; color: white; }
    .btn-minus  { background: #ef4444; color: white; }
    .btn-reset  { background: #334155; color: #94a3b8; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #667eea;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      font-size: 0.95rem;
      transition: transform 0.3s ease;
      z-index: 999;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ── */
    footer {
      color: #334155;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🧵 htmlweaver</h1>
    <p>Split HTML into threads. Weave them back together.</p>
  </div>

  <!-- Cards -->
  <div class="cards">
    <div class="card" onclick="showToast('تم اختيار Split! 🪡')">
      <div class="icon">✂️</div>
      <h3>Split</h3>
      <p>فصل HTML إلى ملفات منفصلة</p>
    </div>
    <div class="card" onclick="showToast('تم اختيار Combine! 🧵')">
      <div class="icon">🔗</div>
      <h3>Combine</h3>
      <p>دمج الملفات في HTML واحد</p>
    </div>
    <div class="card" onclick="showToast('قريباً: دعم Vue! ⚡')">
      <div class="icon">⚡</div>
      <h3>Vue Export</h3>
      <p>تحويل إلى مكونات Vue</p>
    </div>
    <div class="card" onclick="showToast('قريباً: دعم React! ⚛️')">
      <div class="icon">⚛️</div>
      <h3>React Export</h3>
      <p>تحويل إلى مكونات React</p>
    </div>
  </div>

  <!-- Counter -->
  <div class="counter-section">
    <p style="color:#94a3b8; margin-bottom:0.5rem;">عداد الاختبار</p>
    <div class="counter-display" id="counter">0</div>
    <div class="btn-group">
      <button class="btn btn-add"   onclick="changeCount(1)">＋ زيادة</button>
      <button class="btn btn-minus" onclick="changeCount(-1)">－ نقصان</button>
      <button class="btn btn-reset" onclick="resetCount()">↺ إعادة</button>
    </div>
  </div>

  <!-- Footer -->
  <footer>made with 🧵 htmlweaver — abutlb</footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Counter Logic ──────────────────────────────
    let count = 0;

    function changeCount(val) {
      count += val;
      const el = document.getElementById('counter');
      el.textContent = count;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 150);
    }

    function resetCount() {
      count = 0;
      document.getElementById('counter').textContent = '0';
      showToast('تمت إعادة العداد ↺');
    }

    // ── Toast Logic ────────────────────────────────
    let toastTimer;

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── Card Keyboard Navigation ───────────────────
    document.querySelectorAll('.card').forEach(card => {
      card.setAttribute('tabindex', '0');
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter') card.click();
      });
    });

    // ── Welcome Toast ──────────────────────────────
    window.addEventListener('load', () => {
      setTimeout(() => showToast('مرحباً بك في htmlweaver 🧵'), 500);
    });
  </script>

</body>
</html>
